version: 2
# Cadence + grouping tuned to keep the PR volume low: MONTHLY, and every
# ecosystem's updates are collapsed into a SINGLE grouped PR (one PR per
# ecosystem per month instead of one per package). Security updates are
# unaffected — Dependabot still opens those immediately, out of band, when a
# real advisory lands. Bump an interval back to "weekly" only if a specific
# ecosystem needs to move faster.
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "ci"

  # Bumps the base-image digest in docker/Dockerfile when python:3.14-slim-*
  # ships a new sha256. A1 pinned FROM python:...@sha256:...; without this
  # ecosystem we'd have to regenerate the digest by hand each security bump.
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      docker:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "docker"

  # Keeps .pre-commit-config.yaml rev: pins fresh in line with the rest of
  # the supply-chain hardening (ruff and pre-commit-hooks).
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      pre-commit:
        patterns: ["*"]
    labels:
      - "dependencies"
      - "pre-commit"
