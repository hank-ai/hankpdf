version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"

  # Bumps the base-image digest in docker/Dockerfile when python:3.14-slim-*
  # ships a new sha256. A1 pinned FROM python:...@sha256:...; without this
  # ecosystem we'd have to regenerate the digest by hand each security bump.
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"

  # Keeps .pre-commit-config.yaml rev: pins fresh in line with the rest of
  # the supply-chain hardening (ruff and pre-commit-hooks).
  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "pre-commit"
