# Triggered only when a GitHub Release is published. Uses PyPI's OIDC
# Trusted Publisher (no long-lived API token). Configure the publisher
# entry at https://pypi.org/manage/account/publishing/ once before the
# first release.
#
# Workflow safety notes:
# - No untrusted github.event.* fields are interpolated into run: steps.
# - All uses: are pinned actions from the actions/, astral-sh/, and pypa/ orgs.
# - id-token: write is needed for OIDC trusted publishing only; contents: read
#   is the minimum required for actions/checkout.

name: release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build sdist + wheel and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: "3.14"
          # Disable cache: this workflow publishes to PyPI; a poisoned
          # uv cache from a prior run could end up in the published
          # artifact (zizmor cache-poisoning audit).
          enable-cache: false
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI via Trusted Publisher
        # TODO(human): verify this SHA matches the latest pypa/gh-action-pypi-publish
        # release before merging.
        # gh api repos/pypa/gh-action-pypi-publish/releases/latest --jq .tag_name
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
