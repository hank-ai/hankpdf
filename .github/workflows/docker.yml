# Workflow safety notes (matches .github/workflows/ci.yml style):
# - Triggers are push/pull_request from this repo plus manual dispatch; no
#   issue/comment events, no release events. None of the known-dangerous
#   github.event.* fields (issue title/body, PR title/body, commit message,
#   comment body, head_ref, etc.) are ever interpolated into run: steps.
# - All uses: are pinned actions from the actions/ and docker/ orgs.
# - Only trusted inputs appear in run: steps: GITHUB_SHA (commit SHA),
#   github.workspace (runner path). github.actor and secrets.GITHUB_TOKEN
#   feed docker/login-action via its own with: args, never a shell.
# - No scripts receive untrusted input; nothing reads from env vars that
#   carry user-controlled text.

name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "docker/**"
      - ".github/workflows/docker.yml"
      - "pdf_smasher/**"
      - "pyproject.toml"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate smoke fixture
        run: |
          python3 -m pip install --quiet pikepdf
          python3 - <<'PY'
          import pathlib
          import pikepdf
          pathlib.Path("tests/fixtures").mkdir(parents=True, exist_ok=True)
          pdf = pikepdf.new()
          pdf.add_blank_page(page_size=(612, 792))
          pdf.save("tests/fixtures/smoke.pdf")
          PY

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/hank-ai/hankpdf
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (no push)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (version)
        if: github.event_name != 'pull_request'
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          docker pull "ghcr.io/hank-ai/hankpdf:sha-${SHORT_SHA}"
          docker run --rm "ghcr.io/hank-ai/hankpdf:sha-${SHORT_SHA}" --version

      - name: Smoke test (compress)
        if: github.event_name != 'pull_request'
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          docker run --rm -v "${WORKSPACE}/tests/fixtures:/data" \
              "ghcr.io/hank-ai/hankpdf:sha-${SHORT_SHA}" \
              /data/smoke.pdf -o /data/smoke_out.pdf
          test -s tests/fixtures/smoke_out.pdf
