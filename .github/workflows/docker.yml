# Workflow safety notes (matches .github/workflows/ci.yml style):
# - Triggers are push/pull_request from this repo plus manual dispatch; no
#   issue/comment events, no release events. None of the known-dangerous
#   github.event.* fields (issue title/body, PR title/body, commit message,
#   comment body, head_ref, etc.) are ever interpolated into run: steps.
# - All uses: are pinned actions from the actions/ and docker/ orgs.
# - Only trusted inputs appear in run: steps: GITHUB_SHA (commit SHA),
#   github.workspace (runner path). github.actor and secrets.GITHUB_TOKEN
#   feed docker/login-action via its own with: args, never a shell.
# - No scripts receive untrusted input; nothing reads from env vars that
#   carry user-controlled text.

name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
    paths:
      - "docker/**"
      - ".github/workflows/docker.yml"
      - "pdf_smasher/**"
      - "pyproject.toml"
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  # id-token: write is required for cosign keyless signing via GitHub OIDC
  # (the workflow trades its OIDC token for a short-lived sigstore cert).
  # attestations: write lets actions/attest-build-provenance push SLSA v1
  # attestations to the repo's attestations API.
  id-token: write
  attestations: write

jobs:
  build:
    name: Build and publish
    runs-on: ubuntu-latest
    # Whole-job timeout backstops any individual step's timeout; picks up
    # buildx hangs, runner agent crashes, and GHCR outages (E5).
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130  # v3
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate smoke fixtures
        run: |
          # Generates both smoke.pdf (blank, used for the version path)
          # and smoke_text.pdf (rendered-text, exercises the MRC/jbig2
          # compression pipeline). The text fixture must compress
          # >2x or the smoke test fails — catches regressions in the
          # mask/foreground/JBIG2 pipeline end to end.
          python3 -m pip install --quiet pikepdf pillow
          python3 scripts/make_smoke_fixture.py

      - name: Metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5
        with:
          images: ghcr.io/hank-ai/hankpdf
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Compute build metadata
        id: buildmeta
        run: |
          # ISO-8601 UTC; matches docker/metadata-action's convention so
          # org.opencontainers.image.created stays parseable by BuildKit.
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          # Base-image digest is pinned in docker/Dockerfile; read it
          # directly so build-info.json can't drift from the FROM line.
          BASE_DIGEST=$(grep -oE '@sha256:[a-f0-9]{64}' docker/Dockerfile | head -n1)
          echo "base_image_digest=${BASE_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Build (no push)
        if: github.event_name == 'pull_request'
        timeout-minutes: 30
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            HANKPDF_VERSION=${{ steps.meta.outputs.version }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.buildmeta.outputs.build_date }}
            BASE_IMAGE_DIGEST=${{ steps.buildmeta.outputs.base_image_digest }}

      - name: Build and push
        if: github.event_name != 'pull_request'
        id: build
        timeout-minutes: 45
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            HANKPDF_VERSION=${{ steps.meta.outputs.version }}
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.buildmeta.outputs.build_date }}
            BASE_IMAGE_DIGEST=${{ steps.buildmeta.outputs.base_image_digest }}
          # SLSA v1 provenance generated by BuildKit + an SPDX SBOM written
          # into the image's attestation manifest. Verifiers can pull both
          # via `docker buildx imagetools inspect --format ...`.
          provenance: true
          sbom: true

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Sign pushed image with cosign (keyless via GitHub OIDC)
        if: github.event_name != 'pull_request'
        env:
          # Pinned to the by-digest ref so signature can't drift from the
          # exact bytes we pushed. docker/build-push-action@v6 writes the
          # multi-arch manifest digest to its `digest` output.
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          # Sign every tag that metadata-action produced. Each tag resolves
          # to the same digest, so `cosign sign ...@<digest>` stamps the
          # underlying bytes; the tag list is just convenience for
          # consumers pulling by tag.
          cosign sign --yes "ghcr.io/hank-ai/hankpdf@${IMAGE_DIGEST}"

      - name: Attest build provenance (SLSA v1)
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-name: ghcr.io/hank-ai/hankpdf
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Smoke test (version)
        if: github.event_name != 'pull_request'
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          docker pull "ghcr.io/hank-ai/hankpdf:sha-${SHORT_SHA}"
          docker run --rm "ghcr.io/hank-ai/hankpdf:sha-${SHORT_SHA}" --version

      - name: Smoke test (compress blank fixture — uid-matched)
        if: github.event_name != 'pull_request'
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          # Run as the runner's uid/gid so the container can write to the
          # mounted /data dir (the image defaults to uid 1000; the runner
          # is a different uid so the bind mount would otherwise be unwritable).
          docker run --rm \
              --user "$(id -u):$(id -g)" \
              -v "${WORKSPACE}/tests/fixtures:/data" \
              "ghcr.io/hank-ai/hankpdf:sha-${SHORT_SHA}" \
              /data/smoke.pdf -o /data/smoke_out.pdf
          test -s tests/fixtures/smoke_out.pdf

      - name: Smoke test (compress text fixture — assert ratio > 2x)
        if: github.event_name != 'pull_request'
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          # Text fixture exercises the full MRC pipeline: mask + JBIG2
          # on the foreground, FlateDecode on the background. A
          # regression in any of those paths drops the ratio below 2x.
          docker run --rm \
              --user "$(id -u):$(id -g)" \
              -v "${WORKSPACE}/tests/fixtures:/data" \
              "ghcr.io/hank-ai/hankpdf:sha-${SHORT_SHA}" \
              /data/smoke_text.pdf -o /data/smoke_text_out.pdf
          test -s tests/fixtures/smoke_text_out.pdf

          IN_SIZE=$(stat -c%s tests/fixtures/smoke_text.pdf)
          OUT_SIZE=$(stat -c%s tests/fixtures/smoke_text_out.pdf)
          echo "input:  ${IN_SIZE} bytes"
          echo "output: ${OUT_SIZE} bytes"
          # Bash integer math for ratio check; *100 so we compare ints.
          if [ "$((IN_SIZE * 100))" -lt "$((OUT_SIZE * 200))" ]; then
              echo "::error::MRC smoke fixture compressed below 2x (in=${IN_SIZE}, out=${OUT_SIZE}); jbig2/mask/foreground regression suspected"
              exit 1
          fi
          echo "ratio >= 2x OK"

          # GitHub Actions step-summary for visibility in the run page (E5).
          {
              echo "### Docker smoke test"
              echo ""
              echo "| Fixture | Input (bytes) | Output (bytes) | Ratio |"
              echo "|---|---:|---:|---:|"
              echo "| smoke_text.pdf | ${IN_SIZE} | ${OUT_SIZE} | $(awk "BEGIN {printf \"%.2fx\", ${IN_SIZE}/${OUT_SIZE}}") |"
              echo ""
              echo "Image: \`ghcr.io/hank-ai/hankpdf:sha-${SHORT_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke test (uid-mismatch — entrypoint hint path, E1)
        if: github.event_name != 'pull_request'
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          # Runs WITHOUT --user override so the container is uid 1000
          # (image default) while the bind mount is owned by the
          # runner's uid. The entrypoint wrapper (E1) must detect
          # this, print a clear hint, and exit 2 — NOT crash with a
          # raw EACCES from pikepdf/pdfium deep in the engine.
          SHORT_SHA="${GITHUB_SHA::7}"
          mkdir -p "${WORKSPACE}/tests/fixtures/uid-mismatch-dir"
          # Chmod so only the runner uid can write; uid 1000 will be
          # refused.
          chmod 700 "${WORKSPACE}/tests/fixtures/uid-mismatch-dir"
          set +e
          OUTPUT=$(docker run --rm \
              -v "${WORKSPACE}/tests/fixtures/uid-mismatch-dir:/data" \
              "ghcr.io/hank-ai/hankpdf:sha-${SHORT_SHA}" \
              /data/placeholder.pdf -o /data/out.pdf 2>&1)
          RC=$?
          set -e
          echo "exit code: ${RC}"
          echo "output:"
          echo "${OUTPUT}"
          # Entrypoint-detected mismatch must exit 2 and include a hint.
          if [ "${RC}" != "2" ]; then
              echo "::error::uid-mismatch path did NOT exit 2 as expected (got ${RC}); E1 entrypoint wrapper regression?"
              exit 1
          fi
          if ! echo "${OUTPUT}" | grep -q -- "--user"; then
              echo "::error::uid-mismatch error did not mention --user hint; E1 entrypoint wrapper regression?"
              exit 1
          fi
          echo "uid-mismatch entrypoint hint OK"
