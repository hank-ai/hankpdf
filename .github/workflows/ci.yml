# Workflow safety notes:
# - Triggers are push and pull_request from this repo only; no issue/comment
#   events, no release events. None of the known-dangerous github.event.*
#   fields (issue title/body, PR title/body, commit message, comment body,
#   head_ref, etc.) are ever interpolated into run: steps.
# - All uses: are pinned actions from the actions/ and astral-sh/ orgs.
# - No scripts receive untrusted input; nothing reads from env vars that
#   carry user-controlled text.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          python-version: "3.14"
      - name: Install dev deps
        run: uv sync --dev
      - name: Ruff check
        run: uv run ruff check pdf_smasher tests
      - name: Ruff format (check only)
        run: uv run ruff format --check pdf_smasher tests
      - name: Mypy
        run: uv run mypy pdf_smasher

  workflow-audit:
    # Static analysis of every workflow in .github/workflows/ via
    # zizmor (security smells — script injection, secret handling,
    # risky checkout patterns) and actionlint (shell syntax,
    # misspelled action inputs, deprecated features). Both run fast
    # (< 30 s each) and catch regressions before they reach prod.
    name: zizmor + actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      # Run zizmor directly via its CLI, not the composite action. The action
      # tries to upload SARIF to GitHub Code Scanning, which requires GitHub
      # Advanced Security — not available on this private repo without a paid
      # license. Direct CLI keeps the lint gate without the upload dependency.
      - name: Install zizmor
        run: pipx install zizmor==1.24.1
      - name: zizmor
        # --min-severity=medium skips stylistic informational findings
        # (e.g. "use gh CLI instead of action X") while still failing
        # on medium+ security smells: script injection, missing
        # persist-credentials, overly broad permissions, etc.
        run: zizmor --min-severity=medium .github/workflows/
      - name: actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d  # v1.72.0

  versions-single-source:
    # Enforce that .github/versions.json is the ONLY place the jbig2enc
    # commit SHA appears. If someone copy-pastes the SHA into docker/
    # Dockerfile or a workflow, this job fails so the single-source-of-
    # truth invariant from A5 stays intact.
    name: versions.json is the only source of truth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      - name: Enforce single source of truth for JBIG2ENC_COMMIT
        env:
          VERSIONS_FILE: .github/versions.json
        run: |
          set -euo pipefail
          if ! command -v jq >/dev/null; then sudo apt-get update -qq && sudo apt-get install -y jq; fi
          SHA=$(jq -r '.jbig2enc_commit' "$VERSIONS_FILE")
          if [[ ! "$SHA" =~ ^[a-f0-9]{40}$ ]]; then
              echo "::error::versions.json jbig2enc_commit is not a 40-hex SHA: $SHA"
              exit 1
          fi
          # Grep the SHA everywhere EXCEPT versions.json. Exclude .git
          # and the worktrees dir so local dev runs don't trip on their
          # own commit history.
          MATCHES=$(grep -r --line-number --fixed-strings "$SHA" . \
              --exclude-dir=.git \
              --exclude-dir=.worktrees \
              --exclude="versions.json" \
              | grep -v "$VERSIONS_FILE" || true)
          if [ -n "$MATCHES" ]; then
              echo "::error::JBIG2ENC_COMMIT SHA '$SHA' appears outside $VERSIONS_FILE:"
              echo "$MATCHES"
              exit 1
          fi
          echo "OK: $SHA only appears in $VERSIONS_FILE"

  test:
    name: Test (Python 3.14, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          python-version: "3.14"
      - name: Install tesseract (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - name: Install tesseract (macOS)
        if: runner.os == 'macOS'
        run: brew install tesseract
      # Windows tesseract is painful on CI; OCR unit tests auto-skip via
      # pytestmark when the binary is absent (see tests/unit/engine/test_ocr.py).
      - name: Install project + dev deps
        run: uv sync --dev
      - name: Run unit tests
        run: uv run pytest tests/unit -v
