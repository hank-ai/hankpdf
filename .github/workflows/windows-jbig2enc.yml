# Workflow safety notes (matches .github/workflows/ci.yml / docker.yml style):
# - Triggers are workflow_dispatch (manual) and push of jbig2-windows-v* tags
#   from this repo only; no issue/comment events, no pull_request, no release
#   events. None of the known-dangerous github.event.* fields (issue title/body,
#   PR title/body, commit message, comment body, head_ref, etc.) are ever
#   interpolated into run: steps.
# - All uses: are pinned actions from the actions/, msys2/, and softprops/
#   orgs already trusted elsewhere in this repo.
# - Only trusted inputs appear in run: steps: the literal jbig2enc commit SHA
#   (pinned in env), GITHUB_REF_NAME (validated by the tag trigger glob), and
#   runner-local paths. No env vars carry user-controlled text.
# - The jbig2enc source is fetched fresh from GitHub at a pinned commit SHA;
#   we never build from a ref that a third party could redirect.

name: Windows jbig2.exe build

on:
  workflow_dispatch:
  push:
    tags: ["jbig2-windows-v*"]

concurrency:
  group: windows-jbig2enc-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write       # required by softprops/action-gh-release on tag push
  id-token: write       # OIDC for attest-build-provenance (sigstore keyless)
  attestations: write   # push signed SLSA attestations to the repo

env:
  # BUNDLE_NAME is the release zip's base name. JBIG2ENC_COMMIT is no longer
  # set here — see the "Read pinned versions" step below, which pulls from
  # .github/versions.json (single source of truth shared with the Docker
  # build). CI's workflow-audit job fails if the commit SHA ever appears
  # outside versions.json.
  BUNDLE_NAME: jbig2-windows-x64

jobs:
  build:
    name: Build jbig2.exe (MSYS2 / MinGW-w64)
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout (workflow file only)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Read pinned versions from .github/versions.json
        shell: pwsh
        run: |
          # Use pwsh + ConvertFrom-Json (stdlib on GitHub's windows-2022
          # runner) so we don't need jq. Exports JBIG2ENC_COMMIT into the
          # job env via $GITHUB_ENV. If versions.json ever drifts this
          # step fails fast before MSYS2 bootstrap.
          $versions = Get-Content -Raw .github/versions.json | ConvertFrom-Json
          if (-not $versions.jbig2enc_commit) {
              Write-Error "versions.json missing jbig2enc_commit"
              exit 1
          }
          if ($versions.jbig2enc_commit -notmatch '^[a-f0-9]{40}$') {
              Write-Error "versions.json jbig2enc_commit is not a 40-hex SHA"
              exit 1
          }
          "JBIG2ENC_COMMIT=$($versions.jbig2enc_commit)" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          "LEPTONICA_MIN_VERSION=$($versions.leptonica_min_version)" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          Write-Host "Pinned jbig2enc commit: $($versions.jbig2enc_commit)"

      - name: Set up MSYS2 / MinGW64
        uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c  # v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-autotools
            mingw-w64-x86_64-libtool
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-leptonica
            mingw-w64-x86_64-libtiff
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libwebp
            zip
            unzip

      - name: Clone jbig2enc at pinned commit
        run: |
          set -euo pipefail
          git clone https://github.com/agl/jbig2enc.git /tmp/src
          cd /tmp/src
          git checkout "${JBIG2ENC_COMMIT}"
          git rev-parse HEAD

      - name: Build jbig2enc
        run: |
          set -euo pipefail
          cd /tmp/src
          ./autogen.sh
          ./configure --prefix=/mingw64
          make -j"$(nproc)"
          ls -la src/jbig2.exe

      - name: Record MSYS2 package versions + enforce Leptonica floor
        run: |
          set -euo pipefail
          DIST_ROOT="$(cygpath -u "${GITHUB_WORKSPACE}")/dist"
          BUNDLE_DIR="${DIST_ROOT}/${BUNDLE_NAME}"
          mkdir -p "${BUNDLE_DIR}"
          # Capture exact versions of each linked lib. Shipped inside the
          # bundle so an on-call can paste `versions.txt` into a bug
          # report. Also enforces the leptonica_min_version floor from
          # versions.json — pacman's lack of native version pins means
          # this check is our last line of defense against an MSYS2
          # refresh that drops a lib below the floor.
          pacman -Q \
              mingw-w64-x86_64-leptonica \
              mingw-w64-x86_64-libtiff \
              mingw-w64-x86_64-libpng \
              mingw-w64-x86_64-libjpeg-turbo \
              mingw-w64-x86_64-libwebp \
              mingw-w64-x86_64-gcc \
              | tee "${BUNDLE_DIR}/versions.txt"

          LEP_VER="$(pacman -Q mingw-w64-x86_64-leptonica | awk '{print $2}' | cut -d- -f1)"
          FLOOR="${LEPTONICA_MIN_VERSION:-}"
          if [ -z "${FLOOR}" ]; then
              echo "::error::LEPTONICA_MIN_VERSION not set (versions.json read step did not run?)"
              exit 1
          fi
          # Semver-ish comparison via sort -V. sort -V sorts "1.85.0" <
          # "1.85.1" correctly; we want FLOOR <= LEP_VER. If the min
          # equals the max of (FLOOR, LEP_VER), LEP_VER is at or above
          # the floor.
          if [ "$(printf '%s\n%s' "${LEP_VER}" "${FLOOR}" | sort -V | head -n1)" != "${FLOOR}" ]; then
              echo "::error::Leptonica ${LEP_VER} below floor ${FLOOR} (see .github/versions.json)"
              exit 1
          fi
          echo "Leptonica ${LEP_VER} satisfies floor ${FLOOR}"

      - name: Assemble distribution bundle
        env:
          BUNDLE: ${{ env.BUNDLE_NAME }}
        run: |
          set -euo pipefail

          DIST_ROOT="$(cygpath -u "${GITHUB_WORKSPACE}")/dist"
          BUNDLE_DIR="${DIST_ROOT}/${BUNDLE}"

          # versions.txt was written by the previous step; keep it.
          cp /tmp/src/src/jbig2.exe "${BUNDLE_DIR}/"
          cp /tmp/src/LICENSE "${BUNDLE_DIR}/LICENSE" 2>/dev/null || \
              cp /tmp/src/COPYING "${BUNDLE_DIR}/LICENSE" 2>/dev/null || \
              echo "WARNING: no LICENSE/COPYING found in jbig2enc tree" >&2

          # Walk ldd output and copy every DLL that lives under /mingw64.
          # System DLLs (C:\Windows\System32\...) are left to the OS.
          echo "=== ldd jbig2.exe ==="
          ldd "${BUNDLE_DIR}/jbig2.exe" || true
          echo "====================="

          ldd "${BUNDLE_DIR}/jbig2.exe" \
              | awk '{print $3}' \
              | grep -E '^/(mingw64|ucrt64)/' \
              | sort -u \
              | while read -r dll; do
                  if [ -f "${dll}" ]; then
                      cp -v "${dll}" "${BUNDLE_DIR}/"
                  fi
              done

          # Write README.txt (static; no untrusted interpolation).
          cat >"${BUNDLE_DIR}/README.txt" <<EOF
          jbig2.exe built for HankPDF.

          Place this directory on your PATH, or run
          scripts/install_jbig2_windows.ps1 from the hankpdf repo to
          auto-install and register the directory on your user PATH.

          Source: https://github.com/agl/jbig2enc
          Commit: ${JBIG2ENC_COMMIT}

          Build toolchain: MSYS2 / MinGW-w64 (GCC) on windows-2022 runner.
          Linked against Leptonica, libtiff, libpng, libjpeg-turbo, libwebp,
          zlib, and MinGW C/C++ runtimes - every non-system DLL the binary
          depends on is included alongside jbig2.exe in this bundle.

          License: Apache-2.0 (see LICENSE).
          EOF

          echo "=== bundle contents ==="
          ls -la "${BUNDLE_DIR}"

      - name: Smoke test jbig2.exe
        env:
          BUNDLE: ${{ env.BUNDLE_NAME }}
        run: |
          set -euo pipefail
          DIST_ROOT="$(cygpath -u "${GITHUB_WORKSPACE}")/dist"
          cd "${DIST_ROOT}/${BUNDLE}"
          # jbig2enc has no --version flag; calling it with no args prints
          # usage on stderr and exits non-zero. Treat "produced output" as
          # success - all we need to verify is the binary loads its DLLs.
          set +e
          OUTPUT="$(./jbig2.exe 2>&1)"
          RC=$?
          set -e
          echo "exit code: ${RC}"
          echo "----- jbig2 output -----"
          echo "${OUTPUT}"
          echo "------------------------"
          if [ -z "${OUTPUT}" ]; then
              echo "ERROR: jbig2.exe produced no output - DLL loading likely failed" >&2
              exit 1
          fi
          echo "jbig2.exe runs and emits usage text - DLL bundle is complete."

      - name: Smoke test bundle from scratch dir (stripped PATH)
        shell: pwsh
        run: |
          # Validates that the bundle's DLLs resolve from the sibling-dir,
          # the way end users will actually run it — not from /mingw64/bin
          # where the linker found them at build time. A missing DLL in
          # the copy step would pass the prior in-place smoke test
          # (because ldd's libs are still on the linker path) but break
          # in the real install location.
          $ErrorActionPreference = 'Stop'
          $src = Join-Path $env:GITHUB_WORKSPACE "dist/$env:BUNDLE_NAME"
          $scratch = Join-Path $env:TEMP ("jbig2-scratch-" + [Guid]::NewGuid().ToString('N'))
          New-Item -ItemType Directory -Path $scratch | Out-Null
          Copy-Item -Path "$src\*" -Destination $scratch -Recurse

          # Wipe PATH to a minimal system set so /mingw64/bin cannot
          # satisfy any DLL load. If the bundle is complete, jbig2.exe
          # finds its DLLs in the scratch dir itself.
          $sysPaths = @(
              "$env:WINDIR\System32",
              "$env:WINDIR",
              "$env:WINDIR\System32\Wbem",
              "$env:WINDIR\System32\WindowsPowerShell\v1.0"
          ) -join ';'

          Push-Location $scratch
          try {
              # NOTE: Start-Process would spawn a new shell inheriting
              # its own PATH. We need to actually invoke jbig2.exe from
              # this pwsh process with PATH locally overridden.
              $origPath = $env:PATH
              try {
                  $env:PATH = $sysPaths
                  $result = & .\jbig2.exe 2>&1
                  Write-Host "jbig2.exe output:"
                  Write-Host "$result"
              } finally {
                  $env:PATH = $origPath
              }
              if (-not $result) {
                  throw "jbig2.exe produced no output from scratch dir; bundle is missing a DLL"
              }
              Write-Host "OK: jbig2.exe loads all DLLs from the bundle dir"
          } finally {
              Pop-Location
              Remove-Item -Recurse -Force $scratch -ErrorAction SilentlyContinue
          }

      - name: Zip bundle + compute SHA-256 sidecar
        env:
          BUNDLE: ${{ env.BUNDLE_NAME }}
        run: |
          set -euo pipefail
          DIST_ROOT="$(cygpath -u "${GITHUB_WORKSPACE}")/dist"
          cd "${DIST_ROOT}"
          zip -r "${BUNDLE}.zip" "${BUNDLE}"
          ls -la "${BUNDLE}.zip"
          # Sanity: ensure the zip round-trips.
          unzip -l "${BUNDLE}.zip" | tail -20

          # Sidecar lets users verify the download before extracting.
          # Format matches `sha256sum -c`: "<hex>  <relative-path>".
          # Installer script verifies by reading BOTH files from the
          # same release (see A7).
          sha256sum "${BUNDLE}.zip" > "${BUNDLE}.zip.sha256"
          echo "SHA-256 sidecar:"
          cat "${BUNDLE}.zip.sha256"

      - name: Stage installer script as release asset
        run: |
          set -euo pipefail
          DIST_ROOT="$(cygpath -u "${GITHUB_WORKSPACE}")/dist"
          SRC_SCRIPT="$(cygpath -u "${GITHUB_WORKSPACE}")/scripts/install_jbig2_windows.ps1"
          cp "${SRC_SCRIPT}" "${DIST_ROOT}/install_jbig2_windows.ps1"
          cd "${DIST_ROOT}"
          sha256sum install_jbig2_windows.ps1 > install_jbig2_windows.ps1.sha256
          echo "Installer SHA-256 sidecar:"
          cat install_jbig2_windows.ps1.sha256

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ${{ env.BUNDLE_NAME }}
          path: |
            dist/${{ env.BUNDLE_NAME }}.zip
            dist/${{ env.BUNDLE_NAME }}.zip.sha256
            dist/install_jbig2_windows.ps1
            dist/install_jbig2_windows.ps1.sha256
          if-no-files-found: error
          retention-days: 90

      - name: Attest build provenance (SLSA v1)
        if: startsWith(github.ref, 'refs/tags/jbig2-windows-v')
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          # Both the zip and the installer carry their own signed
          # provenance. Users can verify via `gh attestation verify`.
          subject-path: |
            dist/${{ env.BUNDLE_NAME }}.zip
            dist/install_jbig2_windows.ps1

      - name: Publish GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/jbig2-windows-v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: |
            dist/${{ env.BUNDLE_NAME }}.zip
            dist/${{ env.BUNDLE_NAME }}.zip.sha256
            dist/install_jbig2_windows.ps1
            dist/install_jbig2_windows.ps1.sha256
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          body: |
            Prebuilt `jbig2.exe` for native Windows x64 - built from
            [agl/jbig2enc](https://github.com/agl/jbig2enc) at commit
            `${{ env.JBIG2ENC_COMMIT }}` via MSYS2 / MinGW-w64.

            **Install (tagged, auditable URL):**

            ```powershell
            irm https://github.com/hank-ai/hankpdf/releases/download/${{ github.ref_name }}/install_jbig2_windows.ps1 | iex
            ```

            Extract `jbig2-windows-x64.zip` and place the directory on
            your PATH, or run the installer script above to auto-install
            to `%LOCALAPPDATA%\hankpdf\bin` and register it on your user
            PATH.

            **Verifying the download (before you trust it):**

            ```powershell
            # After downloading both files from this release:
            $hash = (Get-FileHash jbig2-windows-x64.zip -Algorithm SHA256).Hash.ToLower()
            $expected = (Get-Content jbig2-windows-x64.zip.sha256) -split '\s+' | Select-Object -First 1
            if ($hash -ne $expected) { throw "SHA-256 mismatch" }
            ```

            The bundle ships `jbig2.exe` plus every non-system DLL it
            depends on (Leptonica, libtiff, libpng, libjpeg-turbo,
            libwebp, zlib, MinGW C/C++ runtimes). Release assets carry
            SLSA v1 build provenance; verify via
            `gh attestation verify <file> --owner hank-ai`.
